<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>📖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap');
:root{
  --bg:#000;--bg2:#0c0c12;--card:#151520;
  --gold:#c8a96e;--gold2:#e8d4a8;
  --text:#e0d8cc;--dim:#666;--dim2:#222;--red:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;background:var(--bg);font-family:'Noto Serif TC',-apple-system,serif;color:var(--text);font-size:14px}
body{padding:10px 8px 40px;max-width:260px;margin:0 auto}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 10px;border-bottom:1px solid var(–dim2);margin-bottom:10px}
.hdr-title{font-size:12px;color:var(–gold);letter-spacing:3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-clock{font-size:11px;color:var(–dim)}
.sync-btn{font-size:18px;cursor:pointer;display:inline-block;transition:transform .3s;color:var(–gold)}
.sync-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.sync-status{font-size:9px;color:var(–dim);text-align:center;margin-bottom:8px;letter-spacing:1px;min-height:14px}
.sync-status.ok{color:rgba(39,174,96,.7)}
.sync-status.err{color:rgba(192,57,43,.7)}

.continue-card{background:linear-gradient(135deg,#1a1508,#0e0c06);border:1px solid rgba(200,169,110,.25);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:10px;transition:all .15s;text-decoration:none;color:inherit}
.continue-card:active{transform:scale(.97);border-color:rgba(200,169,110,.5)}
.cc-icon{font-size:24px;flex-shrink:0}
.cc-body{flex:1;min-width:0}
.cc-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(–text)}
.cc-sub{font-size:10px;color:var(–gold);margin-top:2px}
.cc-arr{font-size:16px;color:var(–gold)}

.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(–dim2)}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:10px;color:var(–dim);border-bottom:2px solid transparent;cursor:pointer;letter-spacing:1px;margin-bottom:-1px;transition:all .2s}
.tab.active{color:var(–gold);border-color:var(–gold)}

/* Bookmarks */
.bm-item{background:var(–card);border:1px solid var(–dim2);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit}
.bm-item:active{background:rgba(200,169,110,.08);border-color:rgba(200,169,110,.3)}
.bm-bar{width:3px;height:32px;border-radius:3px;background:linear-gradient(180deg,var(–gold),transparent);flex-shrink:0}
.bm-info{flex:1;min-width:0}
.bm-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(–text)}
.bm-ch{font-size:10px;color:var(–gold);margin-top:2px}
.bm-x{width:24px;height:24px;border-radius:50%;background:rgba(192,57,43,.12);display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(192,57,43,.5);cursor:pointer;flex-shrink:0;border:none}
.bm-x:active{background:rgba(192,57,43,.3);color:var(–red)}

/* Chapter */
.ch-box{background:var(–card);border:1px solid var(–dim2);border-radius:14px;padding:14px;margin-bottom:8px}
.ch-book{font-size:10px;color:var(–dim);text-align:center;margin-bottom:10px;letter-spacing:1px}
.ch-num-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px}
.ch-adj{width:38px;height:38px;border-radius:10px;background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.2);color:var(–gold);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;flex-shrink:0;-webkit-appearance:none}
.ch-adj:active{background:rgba(200,169,110,.25)}
.ch-num{font-size:40px;font-weight:300;color:var(–gold);letter-spacing:-1px;min-width:64px;text-align:center;line-height:1}
.ch-unit{font-size:10px;color:var(–dim);text-align:center;margin-top:4px}

/* Go button - plain <a> tag for reliable navigation */
.go-link{display:block;width:100%;background:linear-gradient(135deg,var(–gold),var(–gold2));border-radius:12px;padding:14px;font-size:13px;font-weight:700;color:#000;text-align:center;text-decoration:none;letter-spacing:3px;margin-top:6px;font-family:inherit;transition:opacity .15s}
.go-link:active{opacity:.8}

/* Form */
.form-group{margin-bottom:8px}
.f-label{font-size:9px;letter-spacing:2px;color:var(–dim);margin-bottom:4px}
.f-input{width:100%;background:var(–card);border:1px solid var(–dim2);border-radius:10px;padding:11px 12px;font-size:12px;color:var(–text);font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s}
.f-input:focus{border-color:var(–gold)}
.f-input::placeholder{color:var(–dim);font-size:11px}
.f-btn{width:100%;background:linear-gradient(135deg,var(–gold),var(–gold2));border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;letter-spacing:2px;margin-top:4px;-webkit-appearance:none}
.f-btn:active{opacity:.8}
.f-btn-ghost{background:transparent;border:1px solid rgba(192,57,43,.3);color:var(–red);margin-top:8px}
.f-btn-ghost:active{background:rgba(192,57,43,.1)}

.empty{text-align:center;padding:24px 16px;color:var(–dim);font-size:11px;letter-spacing:1px;line-height:2.2}

#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(20,20,30,.95);border:1px solid rgba(200,169,110,.35);border-radius:16px;padding:8px 18px;font-size:11px;color:var(–gold2);letter-spacing:1px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{display:none}
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-title">📖 閱讀器</div>
  <div class="hdr-right">
    <div class="hdr-clock" id="clock">--:--</div>
    <div class="sync-btn" id="sync-btn" onclick="doSync()">⟳</div>
  </div>
</div>

<div class="sync-status" id="sync-status"></div>

<!-- 繼續閱讀 -->

<a class="continue-card" id="continue-link" href="#" onclick="return handleContinue(event)">
  <div class="cc-icon">📖</div>
  <div class="cc-body">
    <div class="cc-title" id="home-title">尚無進度</div>
    <div class="cc-sub" id="home-sub">新增書籤開始閱讀</div>
  </div>
  <div class="cc-arr">›</div>
</a>

<!-- Tabs -->

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">書籤</div>
  <div class="tab" onclick="showTab(1)">章節</div>
  <div class="tab" onclick="showTab(2)">新增</div>
</div>

<!-- Tab 0: 書籤 -->

<div id="tab-0">
  <div id="bm-list"></div>
</div>

<!-- Tab 1: 章節 -->

<div id="tab-1" style="display:none">
  <div class="ch-box">
    <div class="ch-book" id="ch-book">請先選擇書籍</div>
    <div class="ch-num-row">
      <button class="ch-adj" onclick="adjCh(-10)">«</button>
      <button class="ch-adj" onclick="adjCh(-1)">‹</button>
      <div class="ch-num" id="ch-disp">1</div>
      <button class="ch-adj" onclick="adjCh(1)">›</button>
      <button class="ch-adj" onclick="adjCh(10)">»</button>
    </div>
    <div class="ch-unit">章</div>
  </div>
  <!-- 用 <a> 標籤確保手錶瀏覽器能跳頁 -->
  <a class="go-link" id="go-link" href="#" onclick="return handleGo(event)">前　往</a>
</div>

<!-- Tab 2: 新增 -->

<div id="tab-2" style="display:none">
  <div class="form-group">
    <div class="f-label">書名</div>
    <input class="f-input" id="inp-name" type="text" placeholder="例：三體" maxlength="20">
  </div>
  <div class="form-group">
    <div class="f-label">章節網址</div>
    <input class="f-input" id="inp-url" type="url" placeholder="https://czbooks.net/…" inputmode="url">
  </div>
  <button class="f-btn" onclick="saveBm()">儲　存</button>
  <button class="f-btn f-btn-ghost" onclick="clearAll()">清除所有書籤</button>
</div>

<div id="toast"></div>

<script>
// ── Config ──
const API_KEY = '$2a$10$NcIwmp2lUFRhOfligN5xD.tvQLX92SLf/zqCCXbUkgDbYK.6KAUu6';
const BIN_NAME = 'novel-reader-p60732';
let BIN_ID = localStorage.getItem('jb_id') || null;

// ── State ──
let D = { cur: null, bm: [] };
let tCh = 1;

// ── Clock ──
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 15000);

// ── Toast ──
let tt;
function toast(m) {
  const e = document.getElementById('toast');
  e.textContent = m; e.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => e.classList.remove('show'), 2000);
}

function setStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status' + (cls ? ' ' + cls : '');
}

// ── JSONBin ──
const BASE = 'https://api.jsonbin.io/v3/b';
const H = { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY };

async function createBin() {
  const r = await fetch(BASE, {
    method: 'POST',
    headers: { ...H, 'X-Bin-Name': BIN_NAME, 'X-Bin-Private': 'false' },
    body: JSON.stringify(D)
  });
  const j = await r.json();
  BIN_ID = j.metadata.id;
  localStorage.setItem('jb_id', BIN_ID);
}

async function readBin() {
  const r = await fetch(`${BASE}/${BIN_ID}/latest`, { headers: H });
  const j = await r.json();
  return j.record;
}

async function writeBin() {
  await fetch(`${BASE}/${BIN_ID}`, {
    method: 'PUT', headers: H, body: JSON.stringify(D)
  });
}

// ── Sync ──
async function doSync() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('spinning');
  setStatus('同步中…');
  try {
    if (!BIN_ID) {
      await createBin();
      setStatus('✓ 雲端建立成功', 'ok');
    } else {
      const remote = await readBin();
      // 合併書籤
      const remoteIds = new Set((remote.bm || []).map(b => b.id));
      const localOnly = D.bm.filter(b => !remoteIds.has(b.id));
      D.bm = [...(remote.bm || []), ...localOnly];
      D.cur = remote.cur || D.cur;
      await writeBin();
      saveLocal();
      updateUI();
      setStatus('✓ ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) + ' 已同步', 'ok');
    }
    toast('同步完成 ✓');
  } catch(e) {
    setStatus('同步失敗，請重試', 'err');
    toast('同步失敗');
    console.log(e);
  }
  btn.classList.remove('spinning');
}

// ── Local ──
function saveLocal() { localStorage.setItem('nv4', JSON.stringify(D)); }
function loadLocal() {
  try { return JSON.parse(localStorage.getItem('nv4')) || { cur: null, bm: [] }; }
  catch { return { cur: null, bm: [] }; }
}

async function saveAll() {
  saveLocal();
  try { if (BIN_ID) await writeBin(); } catch(e) {}
}

// ── URL helpers ──
function parseCh(url) {
  const m = url.match(/[?&]chapterNumber=(\d+)/);
  return m ? parseInt(m[1]) : null;
}
function setCh(url, n) {
  if (/[?&]chapterNumber=\d+/.test(url))
    return url.replace(/([?&]chapterNumber=)\d+/, '$1' + n);
  return url + (url.includes('?') ? '&' : '?') + 'chapterNumber=' + n;
}

// ── Tabs ──
function showTab(i) {
  [0,1,2].forEach(j => {
    document.getElementById('tab-'+j).style.display = j===i ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,j) => el.classList.toggle('active', j===i));
  if (i===1) updateChTab();
}

// ── Continue reading ──
function handleContinue(e) {
  if (!D.cur) { toast('請先新增書籤'); return false; }
  window.location.href = D.cur.url;
  return false;
}

// ── Chapter tab ──
function updateChTab() {
  const c = D.cur;
  document.getElementById('ch-book').textContent = c ? (c.name || '目前書籍') : '請先選擇書籍';
  tCh = c ? (parseCh(c.url) || 1) : 1;
  document.getElementById('ch-disp').textContent = tCh;
  updateGoLink();
}

function adjCh(d) {
  tCh = Math.max(1, tCh + d);
  document.getElementById('ch-disp').textContent = tCh;
  updateGoLink();
}

function updateGoLink() {
  const link = document.getElementById('go-link');
  if (D.cur) {
    link.href = setCh(D.cur.url, tCh);
  } else {
    link.href = '#';
  }
}

function handleGo(e) {
  if (!D.cur) { toast('請先新增書籤'); return false; }
  // 更新進度
  const url = setCh(D.cur.url, tCh);
  D.cur = { ...D.cur, url };
  saveAll();
  updateHome();
  // href 已經設定好，讓瀏覽器自然跳轉
  return true;
}

// ── Home ──
function updateHome() {
  const c = D.cur;
  if (c) {
    const ch = parseCh(c.url);
    document.getElementById('home-title').textContent = c.name || '繼續閱讀';
    document.getElementById('home-sub').textContent = ch ? '第 ' + ch + ' 章' : '點擊繼續';
  } else {
    document.getElementById('home-title').textContent = '尚無進度';
    document.getElementById('home-sub').textContent = '新增書籤開始閱讀';
  }
}

// ── Bookmarks ──
async function saveBm() {
  const name = document.getElementById('inp-name').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  if (!url) { toast('請輸入網址'); return; }
  if (!url.startsWith('http')) { toast('網址格式錯誤'); return; }
  const entry = { id: Date.now(), name: name || ('書籤'+(D.bm.length+1)), url };
  D.bm.unshift(entry);
  D.cur = { name: entry.name, url };
  await saveAll();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value = '';
  updateUI();
  toast('已儲存 ✓');
  showTab(0);
}

function renderBm() {
  const el = document.getElementById('bm-list');
  if (!D.bm.length) {
    el.innerHTML = '<div class="empty">📚<br>尚無書籤<br>點「新增」加入</div>';
    return;
  }
  el.innerHTML = D.bm.map(b => {
    const ch = parseCh(b.url);
    return `<a class="bm-item" href="${esc(b.url)}" onclick="return bmClick(event,${b.id})">
      <div class="bm-bar"></div>
      <div class="bm-info">
        <div class="bm-name">${esc(b.name)}</div>
        <div class="bm-ch">${ch ? '第 '+ch+' 章' : '—'}</div>
      </div>
      <button class="bm-x" onclick="event.stopPropagation();event.preventDefault();delBm(${b.id})">×</button>
    </a>`;
  }).join('');
}

function bmClick(e, id) {
  const b = D.bm.find(x => x.id === id);
  if (!b) return false;
  D.cur = { name: b.name, url: b.url };
  saveAll();
  updateHome();
  return true; // 讓 <a> href 自然跳轉
}

async function delBm(id) {
  D.bm = D.bm.filter(x => x.id !== id);
  if (!D.bm.length) D.cur = null;
  await saveAll();
  renderBm();
  updateHome();
  toast('已刪除');
}

async function clearAll() {
  if (!confirm('確定清除？')) return;
  D.bm = []; D.cur = null;
  await saveAll();
  updateUI();
  toast('已清除');
}

function updateUI() {
  updateHome();
  renderBm();
  updateGoLink();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Init ──
D = loadLocal();
updateUI();
// 有 BIN_ID 就自動同步
if (BIN_ID) {
  setStatus('正在同步…');
  doSync();
} else {
  setStatus('點 ⟳ 建立雲端同步');
}
</script>

</body>
</html>
